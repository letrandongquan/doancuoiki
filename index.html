<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Demo - Giao diện tĩnh</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Web Demo - Giao diện tĩnh</h1>
        <p class="notification" id="notification">Dữ liệu đã được lưu thành công!</p>
        <p class="latest-message">Dữ liệu mới nhất: <span id="latest-message">Chưa có dữ liệu nào</span></p>
        <div class="input-group">
            <input type="text" id="inputValue" placeholder="Nhập dữ liệu...">
            <button class="send-btn">Gửi</button>
            <button class="show-btn">Hiển thị dữ liệu</button>
        </div>
        <table class="data-table">
            <thead>
                <tr>
                    <th>STT</th>
                    <th>Nội dung</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>1</td>
                    <td>Dữ liệu mẫu</td>
                </tr>
                <tr>
                    <td>2</td>
                    <td>Dữ liệu mẫu khác</td>
                </tr>
            </tbody>
        </table>
    </div>
</body>
</html>
